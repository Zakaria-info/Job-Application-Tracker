<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="styles/style.css" />
    <!-- Tailwind + Daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100">
     <!-- Main Container -->
  <div class="max-w-6xl mx-auto p-4">

    <h1 class="text-3xl font-bold mb-6">
      Job Application Tracker
    </h1>


    <!-- Dashboard Section -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">

      <!-- Total Jobs Card -->
      <div class="bg-white p-5 rounded-lg shadow">
        <h3 class="text-[#323B49]">Total</h3>
        <p id="total-count" class="text-2xl font-bold">0</p>
      </div>

      <!-- Interview Count Card -->
      <div class="bg-white p-5 rounded-lg shadow">
        <h3 class="text-[#323B49]">Interview</h3>
        <p id="interview-count" class="text-2xl font-bold text-green-600">0</p>
      </div>

      <!-- Rejected Count Card -->
      <div class="bg-white p-5 rounded-lg shadow">
        <h3 class="text-[#323B49]">Rejected</h3>
        <p id="rejected-count" class="text-2xl font-bold text-red-600">0</p>
      </div>

    </div>


 <!--Available job section -->
    <div>

      <!-- Section Header -->
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-semibold">Available Jobs</h2>
        <span id="job-count" class="text-gray-600">0 Jobs</span>
      </div>


<!-- Tabs with buttons -->
      <div class="mb-6">
        <div class="flex gap-3">

          <button id="tab-all"
            onclick="showTab('all')"
            class="px-4 py-2 rounded-md bg-[#3B82F6] text-white text-sm w-20 h-8">
            All
          </button>

          <button id="tab-interview"
            onclick="showTab('interview')"
            class="px-4 py-2 rounded-md bg-gray-200 text-gray-700 text-sm w-20 h-8">
            Interview
          </button>

          <button id="tab-rejected"
            onclick="showTab('rejected')"
            class="px-4 py-2 rounded-md bg-gray-200 text-gray-700 text-sm w-20 h-8">
            Rejected
          </button>

        </div>
      </div>


      <!-- Jobs card container -->
      <div id="job-container" class="space-y-4"></div>


      <!-- Empty message -->
      <div id="empty-message"
           class="hidden text-center p-10 bg-white rounded-lg shadow">
        <div class="text-5xl mb-3">
            <img src="./assets/jobs.png" alt="">
        </div>
        <h3 class="text-xl font-semibold">No jobs available</h3>
        <p class="text-gray-500">Check back soon for new opportunities</p>
      </div>

    </div>

  </div>

  <!-- Link JS file -->
  <script src="app.js"></script>
  </body>
</html>
